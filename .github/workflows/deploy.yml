name: ERP Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Stop Old Process
        run: pm2 delete erp || true

      - name: Build
        run: npm run build

      - name: Start
        run: pm2 start npm --name erp -- start

      - name: Save PM2
        run: pm2 save
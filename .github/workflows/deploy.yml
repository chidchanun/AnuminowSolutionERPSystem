name: ERP Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_form_setup:
        description: Run npm run setup:form against the target database
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Pull latest code
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          git pull origin main

      - name: Install dependencies
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm ci

      - name: Run unit tests
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm test

      - name: Run lint
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm run lint

      - name: Build Next.js
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm run build

      - name: Setup audit log schema
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm run setup:audit-log

      - name: Setup master data schema
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm run setup:master-data

      - name: Setup form schema manually
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_form_setup }}
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm run setup:form

      - name: Seed permissions
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem
          npm run seed:permissions

      - name: Restart PM2 services
        run: |
          cd /home/ChidchanunServer/AnuminowSolutionERPSystem

          pm2 describe erp > /dev/null \
            && pm2 restart erp --update-env \
            || pm2 start npm --name erp -- start -- -p 3001

          pm2 describe erp-socket > /dev/null \
            && pm2 restart erp-socket --update-env \
            || pm2 start socket-server.js --name erp-socket

          pm2 save

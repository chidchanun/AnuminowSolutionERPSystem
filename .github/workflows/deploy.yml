name: ERP Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: 
          cd ~/AnuminowSolutionERPSystem
          npm i
      
      - name: Build
        run: 
          cd ~/AnuminowSolutionERPSystem
          npm run build

      - name: Restart
        run: |
          cd ~/AnuminowSolutionERPSystem
          pm2 restart erp

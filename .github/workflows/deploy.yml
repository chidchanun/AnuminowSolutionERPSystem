name: ERP Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restart
        run: |
          pm2 delete erp || true
          pm2 start npm --name erp -- start
          pm2 save